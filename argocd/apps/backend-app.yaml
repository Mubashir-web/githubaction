apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: git@github.com:Mubashir-web/githubaction.git
    targetRevision: main
    path: helm/backend
    helm:
      releaseName: my-app-backend
      valueFiles:
        - values.yaml
      parameters:
        - name: image.tag
          value: "v1"
  destination:
    server: https://kubernetes.default.svc
    namespace: my-app
  syncPolicy:
    automated:
      prune: true      # delete resources removed from Git
      selfHeal: true   # revert manual cluster changes
    syncOptions:
      - CreateNamespace=true
