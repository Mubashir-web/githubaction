apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: git@github.com:Mubashir-web/githubaction.git
    targetRevision: main
    path: argocd/apps     # watches this folder for all app yamls
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
