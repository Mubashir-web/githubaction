image:
  repository: 741418289818.dkr.ecr.ap-south-1.amazonaws.com/my-app/backend
  tag: "v1"         # GitHub Actions overwrites this on every deploy
  pullPolicy: Always

replicaCount: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10

env:
  NODE_ENV: "production"
  PORT: "8080"
  DB_NAME: "myappdb"

metrics:
  enabled: true
  path: /metrics
  port: 8080

dbSecret:
  name: db-credentials
