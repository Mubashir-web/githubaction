image:
  repository: 741418289818.dkr.ecr.ap-south-1.amazonaws.com/my-app/frontend
  tag: "v1"
  pullPolicy: Always

service:
  port: 80
  targetPort: 3000     # frontend runs on 3000, not 8080

resources:
  limits:
    memory: "512Mi"    # Next.js needs more memory than backend
    cpu: "500m"

env:
  NODE_ENV: "production"
  NEXT_PUBLIC_API_URL: "http://backend-svc.my-app.svc.cluster.local"

probes:
  liveness:
    path: / # Next.js health route, not /health
  readiness:
    path: /
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
metrics:
  enabled: true
  path: /metrics
  port: 3000
dbSecret:
  name: db-credentials    
